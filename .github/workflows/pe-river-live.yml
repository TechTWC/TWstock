name: 2330 live PE river experiment

on:
  workflow_dispatch:
    inputs:
      analysis_years:
        description: Point-in-Time river lookback in years
        required: true
        default: "5"
        type: string
  push:
    branches:
      - experiment/2330-pe-river-mvp
    paths:
      - "twstock_experiments/**"
      - "twstock_data/**"
      - "data/experiments/2330_pe_river/**"
      - "tests/test_pe_river_live.py"
      - "tests/fixtures/yahoo_2330_delayed.json"
      - ".github/workflows/pe-river-live.yml"
  pull_request:
    paths:
      - "twstock_experiments/**"
      - "twstock_data/**"
      - "data/experiments/2330_pe_river/**"
      - "tests/test_pe_river_live.py"
      - "tests/fixtures/yahoo_2330_delayed.json"
      - ".github/workflows/pe-river-live.yml"

permissions:
  contents: read

jobs:
  deterministic-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test dependency
        run: python -m pip install pytest
      - name: Run experiment deterministic tests
        run: python -m pytest tests/test_pe_river_experiment.py tests/test_pe_river_live.py
      - name: Compile experiment code
        run: python -m compileall -q twstock_experiments twstock_data tests

  build-live-report:
    needs: deterministic-tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ANALYSIS_YEARS: ${{ inputs.analysis_years || '5' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch official history and delayed quote
        run: |
          python -m twstock_experiments.pe_river_live \
            --analysis-years "${ANALYSIS_YEARS}" \
            --output-dir outputs/experiments/2330_pe_river_live
      - name: Validate expected outputs
        run: |
          test -s outputs/experiments/2330_pe_river_live/live_report.html
          test -s outputs/experiments/2330_pe_river_live/live_analysis.json
          test -s outputs/experiments/2330_pe_river_live/historical_pe.csv
          test -s outputs/experiments/2330_pe_river_live/historical_forward_pe.csv
          test -s outputs/experiments/2330_pe_river_live/multi_horizon_backtest.csv
      - name: Upload live research report
        uses: actions/upload-artifact@v4
        with:
          name: 2330-five-year-pe-river-${{ github.run_id }}
          path: outputs/experiments/2330_pe_river_live
          if-no-files-found: error
          retention-days: 14
