name: Manual market data smoke

on:
  workflow_dispatch:
    inputs:
      symbol:
        description: Canonical TWSE symbol
        required: true
        default: 2330.TW
        type: string
      start:
        description: Inclusive start date (YYYY-MM-DD)
        required: true
        default: 2026-06-01
        type: string
      end:
        description: Inclusive end date (YYYY-MM-DD)
        required: true
        default: 2026-07-15
        type: string

permissions:
  contents: read

jobs:
  live-market-data-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SYMBOL: ${{ inputs.symbol }}
      START_DATE: ${{ inputs.start }}
      END_DATE: ${{ inputs.end }}
      OUTPUT_DIR: outputs/live_smoke
      FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch live market data
        run: |
          python -m twstock_data.cli fetch-market \
            --symbol "${SYMBOL}" \
            --start "${START_DATE}" \
            --end "${END_DATE}" \
            --output-dir "${OUTPUT_DIR}" \
            --raw-cache-dir "${OUTPUT_DIR}/raw"

      - name: Validate live smoke outputs
        if: always()
        run: |
          python scripts/validate_market_data_smoke.py \
            --output-dir "${OUTPUT_DIR}" \
            --symbol "${SYMBOL}" \
            --start "${START_DATE}" \
            --end "${END_DATE}"

      - name: Upload live smoke artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: market-data-smoke-${{ inputs.symbol }}-${{ inputs.start }}-${{ inputs.end }}-${{ github.run_id }}
          path: outputs/live_smoke
          if-no-files-found: warn
          retention-days: 14
