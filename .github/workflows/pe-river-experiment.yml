name: 2330 PE river experiment

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "twstock_experiments/**"
      - "data/experiments/2330_pe_river/**"
      - "tests/test_pe_river_experiment.py"
      - ".github/workflows/pe-river-experiment.yml"

permissions:
  contents: read

jobs:
  build-experiment-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependency
        run: python -m pip install pytest

      - name: Run deterministic experiment tests
        run: python -m pytest tests/test_pe_river_experiment.py

      - name: Generate 2330 PE river report
        run: python -m twstock_experiments.pe_river

      - name: Upload experiment report
        uses: actions/upload-artifact@v4
        with:
          name: 2330-pe-river-experiment-${{ github.run_id }}
          path: outputs/experiments/2330_pe_river
          if-no-files-found: error
          retention-days: 14
